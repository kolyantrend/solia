<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon-192x192.png" />
    <title>Solia Live - AI Content Platform on Solana</title>
    <meta name="description" content="Turn your ideas into images with Solia Live AI and monetize your art on Solana blockchain. Create, share, and earn with AI-generated content." />
    <meta name="keywords" content="Solia Live, AI art, Solana, NFT, image generation, crypto art, monetize art, AI content platform" />
    <meta name="author" content="Solia Live" />
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://solia.live/" />
    <meta property="og:title" content="Solia Live - AI Content Platform on Solana" />
    <meta property="og:description" content="Turn your ideas into images with @SoliaLive AI and monetize your art on Solana blockchain." />
    <meta property="og:image" content="https://pub-961550f0079e4ff5a4210868b6523d47.r2.dev/Logo%20New.png" />
    <meta property="og:site_name" content="Solia Live" />
    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@SoliaLive" />
    <meta name="twitter:title" content="Solia Live - AI Content Platform on Solana" />
    <meta name="twitter:description" content="Turn your ideas into images with @SoliaLive AI and monetize your art on Solana blockchain." />
    <meta name="twitter:image" content="https://pub-961550f0079e4ff5a4210868b6523d47.r2.dev/Logo%20New.png" />
    <!-- Canonical -->
    <link rel="canonical" href="https://solia.live/" />
    <style>
      /* Safe area insets for PWA standalone mode (notch + nav buttons) */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
      }
      body {
        padding-top: var(--sat);
        padding-bottom: var(--sab);
        padding-left: var(--sal);
        padding-right: var(--sar);
      }
      /* Jupiter wallet modal + overlays + MWA dialogs: always on top of everything */
      .wallet-adapter-modal-wrapper,
      .wallet-adapter-modal-overlay,
      [class*="UnifiedWalletModal"],
      [class*="unified-wallet-modal"],
      [class*="WalletNotification"],
      [class*="wallet-notification"],
      [class*="Notification__"],
      div[data-radix-popper-content-wrapper],
      div[role="dialog"],
      div[role="alertdialog"],
      div[role="alert"],
      .jup-modal-overlay,
      .mobile-wallet-adapter-embedded-modal-container {
        z-index: 99999 !important;
      }
      /* Hide MWA "We can't find a wallet" error dialog — unhelpful, confuses users */
      .mobile-wallet-adapter-embedded-modal-container {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function() {});
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
